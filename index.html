<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Agra PSK · Generator etykiet roślin</title>

<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" onerror="window.__fail=(window.__fail||[]).concat('ReactDOM')"></script>

<style>
html,body{margin:0;padding:0;}

@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&display=swap');

.app, .app * { box-sizing: border-box; }
.app {
  --ink:#15241A; --forest:#1E3A28; --forest-2:#274A33;
  --paper:#F5EFE1; --paper-2:#EBE2CE; --paper-line:rgba(21,36,26,.14);
  --brass:#A9842E; --brass-l:#CDA24A; --sage:#6E8B6A; --leaf:#8BC34A;
  font-family:'Inter',system-ui,sans-serif;
  min-height:100vh; color:#E7EDE6;
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(105,139,106,.18), transparent 60%),
    linear-gradient(160deg,#13211A 0%,#0E1813 100%);
  padding:28px 20px 64px;
}
.wrap { max-width:1040px; margin:0 auto; }

/* top bar */
.top { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:26px; flex-wrap:wrap; }
.brand { display:flex; align-items:center; gap:13px; }
.brand .mark {
  width:46px; height:46px; border-radius:12px; display:grid; place-items:center;
  background:linear-gradient(150deg,var(--forest-2),var(--forest));
  border:1px solid rgba(139,195,74,.4);
}
.brand .mark img { width:32px; height:32px; object-fit:contain; }
.brand .wm { font-family:'Fraunces',serif; font-weight:600; font-size:22px; letter-spacing:.3px; color:#F4EFE2; line-height:1; }
.brand .sub { font-size:11px; letter-spacing:2.5px; text-transform:uppercase; color:#8FA890; margin-top:4px; }

.actions { display:flex; gap:10px; flex-wrap:wrap; }
.btn {
  font-family:'Inter',sans-serif; font-size:13.5px; font-weight:500; cursor:pointer;
  border-radius:10px; padding:10px 15px; display:inline-flex; align-items:center; gap:8px;
  border:1px solid rgba(231,237,230,.16); background:rgba(255,255,255,.04); color:#E7EDE6;
  transition:.15s;
}
.btn:hover { background:rgba(255,255,255,.09); border-color:rgba(231,237,230,.3); }
.btn:disabled { opacity:.45; cursor:not-allowed; }
.btn.primary {
  background:linear-gradient(150deg,var(--brass-l),var(--brass)); color:#1c1505;
  border-color:transparent; font-weight:600;
}
.btn.primary:hover { filter:brightness(1.06); }

/* ── the plant card (the deliverable) — ZAWSZE POZIOMO ── */
.stage { display:grid; place-items:center; }
.card {
  width:100%; max-width:1000px; aspect-ratio:1.5/1; min-width:0;
  background:var(--paper); color:var(--ink); border-radius:14px; overflow:hidden;
  box-shadow:0 30px 60px -24px rgba(0,0,0,.6), 0 2px 0 rgba(255,255,255,.04) inset;
  display:flex; flex-direction:column; position:relative;
}
.card-head {
  background:linear-gradient(95deg,var(--forest) 0%,var(--forest-2) 100%);
  color:#F2EDDE; padding:13px 26px; display:flex; align-items:center; justify-content:space-between;
  border-bottom:2px solid var(--brass);
}
.card-head .l { display:flex; align-items:center; gap:12px; }
.card-head .leaf { width:34px; height:34px; border-radius:9px; display:grid; place-items:center;
  background:#F3EEDF; }
.card-head .leaf img { width:26px; height:26px; object-fit:contain; }
.card-head .name { font-family:'Fraunces',serif; font-weight:600; font-size:19px; letter-spacing:.4px; }
.card-head .eyebrow { font-size:9.5px; letter-spacing:3px; text-transform:uppercase; color:#A9C0A8; margin-top:2px; }
.card-head .r { text-align:right; font-size:10px; letter-spacing:.5px; color:#BFD2BD; line-height:1.5; }

.card-body { flex:1; display:grid; grid-template-columns:1.32fr 1fr; }

/* left: opis + cena */
.left { padding:20px 24px 18px; display:flex; flex-direction:column; }
.pl-name { font-family:'Fraunces',serif; font-weight:600; font-size:clamp(20px,3vw,30px); line-height:1.04; color:var(--ink); }
.lat-name { font-family:'Fraunces',serif; font-style:italic; font-weight:400; font-size:clamp(12px,1.7vw,16px); color:var(--brass); margin-top:3px; }
.intro { font-size:clamp(11px,1.3vw,12.5px); line-height:1.5; color:#33473A; margin-top:11px; }

.care { margin-top:auto; padding-top:14px; display:grid; grid-template-columns:1fr 1fr; gap:9px 16px; }
.care-row { display:flex; gap:10px; align-items:flex-start; }
.care-ic { width:26px; height:26px; flex:none; border-radius:7px; display:grid; place-items:center;
  background:var(--paper-2); color:var(--sage); border:1px solid var(--paper-line); }
.care-k { font-size:9px; letter-spacing:1.6px; text-transform:uppercase; color:#7E8E7B; }
.care-v { font-size:clamp(10.5px,1.2vw,12px); font-weight:500; color:#2A3B2F; line-height:1.25; }

.price-tag { margin-top:12px; display:flex; align-items:center; justify-content:space-between;
  background:var(--ink); color:#F3EEDF; border-radius:11px; padding:11px 16px; }
.price-tag .cap { font-size:10px; letter-spacing:2.5px; text-transform:uppercase; color:#9FB39C; }
.price-tag .val { font-family:'Fraunces',serif; font-weight:600; }
.price-tag .num { font-size:clamp(20px,2.6vw,28px); line-height:1; }
.price-tag .cur { font-size:15px; color:var(--brass-l); margin-left:5px; }

/* right: zdjęcie */
.right { position:relative; background:var(--paper-2); border-left:1px solid var(--paper-line); overflow:hidden; }
.photo { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
.photo-empty { position:absolute; inset:0; display:flex; flex-direction:column; gap:9px;
  align-items:center; justify-content:center; color:#8a8568; cursor:pointer;
  border:2px dashed rgba(21,36,26,.18); margin:14px; border-radius:11px; text-align:center; padding:14px; }
.photo-empty:hover { color:var(--brass); border-color:var(--brass); }
.photo-loading { position:absolute; inset:0; display:flex; flex-direction:column; gap:11px;
  align-items:center; justify-content:center; color:#5d7359;
  background:repeating-linear-gradient(135deg,#EBE2CE,#EBE2CE 12px,#E4DAC2 12px,#E4DAC2 24px); }
.photo-tools { position:absolute; right:12px; bottom:12px; display:flex; gap:7px; flex-wrap:wrap; justify-content:flex-end; max-width:80%; }
.photo-tools button { cursor:pointer; background:rgba(21,36,26,.78); color:#F3EEDF; border:none;
  border-radius:9px; padding:8px 11px; font-size:12px; display:flex; align-items:center; gap:7px; backdrop-filter:blur(2px); }
.photo-tools button:hover { background:rgba(21,36,26,.95); }
.photo-credit { position:absolute; left:10px; bottom:10px; font-size:9px; letter-spacing:.4px;
  color:#fff; background:rgba(21,36,26,.55); padding:3px 7px; border-radius:6px; }

.card-foot { background:var(--paper-2); border-top:1px solid var(--paper-line);
  padding:8px 26px; display:flex; align-items:center; justify-content:space-between; gap:16px;
  font-size:10px; letter-spacing:.4px; color:#7E8E7B; }
.card-foot .tag { font-style:italic; white-space:nowrap; }
.card-foot .care-note { text-align:right; }

[contenteditable]:focus { outline:2px solid var(--brass-l); outline-offset:2px; border-radius:4px; }

/* start state */
.start { text-align:center; padding:60px 24px; }
.start .big { font-family:'Fraunces',serif; font-size:30px; color:#F3EEE2; font-weight:600; }
.start p { color:#9FB39C; max-width:440px; margin:12px auto 26px; line-height:1.6; font-size:14.5px; }

.hint { text-align:center; color:#7E9079; font-size:12px; margin-top:14px; display:flex;
  gap:7px; align-items:center; justify-content:center; }

/* modal */
.scrim { position:fixed; inset:0; background:rgba(8,14,10,.62); backdrop-filter:blur(3px);
  display:grid; place-items:center; padding:20px; z-index:50; }
.modal { width:100%; max-width:440px; background:var(--paper); color:var(--ink);
  border-radius:16px; overflow:hidden; box-shadow:0 24px 60px -16px rgba(0,0,0,.7); }
.modal-head { background:linear-gradient(95deg,var(--forest),var(--forest-2)); color:#F2EDDE;
  padding:16px 20px; display:flex; align-items:center; justify-content:space-between;
  border-bottom:2px solid var(--brass); }
.modal-head h3 { font-family:'Fraunces',serif; font-weight:600; font-size:18px; margin:0; }
.modal-head .x { cursor:pointer; color:#C6D6C4; background:none; border:none; padding:4px; display:grid; place-items:center; border-radius:6px; }
.modal-head .x:hover { background:rgba(255,255,255,.12); color:#fff; }
.modal-body { padding:20px; }
.modal-body label { display:block; font-size:11px; letter-spacing:1.6px; text-transform:uppercase; color:#7E8E7B; margin-bottom:8px; }
.field { width:100%; font-family:'Inter',sans-serif; font-size:15px; color:var(--ink);
  background:#fff; border:1px solid var(--paper-line); border-radius:10px; padding:12px 14px; }
.field:focus { outline:2px solid var(--brass-l); outline-offset:1px; border-color:var(--brass); }
.price-row { display:flex; gap:10px; align-items:stretch; }
.price-row .cur { display:grid; place-items:center; padding:0 16px; background:var(--ink);
  color:var(--brass-l); border-radius:10px; font-family:'Fraunces',serif; font-size:16px; }
.modal-note { font-size:12px; color:#7E8E7B; margin-top:12px; line-height:1.5; }
.modal-foot { padding:14px 20px 18px; display:flex; gap:10px; justify-content:flex-end; background:var(--paper-2); border-top:1px solid var(--paper-line); }
.modal .btn { color:var(--ink); border-color:var(--paper-line); background:#fff; }
.modal .btn:hover { background:#fff; border-color:var(--brass); }
.modal .btn.primary { color:#1c1505; background:linear-gradient(150deg,var(--brass-l),var(--brass)); border-color:transparent; }
.err { background:#fbeaea; color:#8a2b2b; border:1px solid #e7c4c4; border-radius:9px; padding:10px 12px; font-size:13px; margin-top:12px; }
.spin { animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* print: tylko karta, poziomo */
@media print {
  @page { size:A4 landscape; margin:12mm; }
  body { background:#fff; }
  .app { background:#fff!important; padding:0; }
  .no-print { display:none!important; }
  .stage { display:block; }
  .card { box-shadow:none; max-width:100%; border:1px solid #ccc; aspect-ratio:1.5/1; }
}


/* dodatki dla wersji standalone */
.settings-field{margin-bottom:14px;}
.settings-field:last-child{margin-bottom:0;}
.warn{background:#fff6e6;color:#7a5a16;border:1px solid #e6d3a6;border-radius:9px;padding:10px 12px;font-size:12px;line-height:1.5;margin-top:4px;}
.or{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#7E8E7B;text-align:center;margin:10px 0;}
</style>
</head>

const Cog = (p)=><Svg {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 6.6 19l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.6 1.6 0 0 0 3 13.6H3a2 2 0 1 1 0-4h.1A1.6 1.6 0 0 0 4.6 7l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.6 1.6 0 0 0 10 4.6V4a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 2.7 1.1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8 1.6 1.6 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/></Svg>;
const Loader = (p)=><Svg {...p} className="spin"><path d="M21 12a9 9 0 1 1-6.2-8.5"/></Svg>;

const PROMPT = (name) => `Jesteś doświadczonym ogrodnikiem przygotowującym ujednolicone etykiety roślin dla centrum ogrodniczego "Agra PSK" w Kłodzku.
Na podstawie nazwy rośliny przygotuj zwięzły, rzetelny i poprawny merytorycznie opis na etykietę sprzedażową.
Zwróć WYŁĄCZNIE obiekt JSON (bez komentarzy, bez znaczników), dokładnie wg schematu:
{
 "namePl": "polska nazwa zwyczajowa",
 "nameLat": "nazwa łacińska (rodzaj i gatunek)",
 "intro": "maks. 2 krótkie zdania, łącznie do 25 słów, rzeczowe i zachęcające",
 "light": "wymagania świetlne, maks. 4 słowa",
 "water": "podlewanie, maks. 4 słowa",
 "frost": "mrozoodporność lub strefa, maks. 4 słowa",
 "height": "docelowa wysokość, maks. 4 słowa",
 "care": "jedna krótka wskazówka, maks. 12 słów; jeśli roślina jest trująca dla ludzi lub zwierząt — koniecznie to zaznacz"
}
Roślina podana przez sprzedawcę: "${name}"
Pisz po polsku.`;

/* ── zdjęcie z internetu (Wikipedia, CORS przez origin=*) ── */
async function wikiImage(query, lang) {
  const params = new URLSearchParams({
    action:"query", format:"json", generator:"search",
    gsrsearch:query, gsrlimit:"1", prop:"pageimages",
    piprop:"thumbnail", pithumbsize:"1000", redirects:"1", origin:"*",
  });
  const r = await fetch(`https://${lang}.wikipedia.org/w/api.php?${params}`);
  const j = await r.json();
  const pages = j && j.query && j.query.pages;
  if (!pages) return null;
  const first = Object.values(pages).sort((a,b)=>(a.index||0)-(b.index||0))[0];
  return (first && first.thumbnail && first.thumbnail.source) || null;
}
async function findImage(d, raw) {
  const tries = [[d.nameLat,"pl"],[d.namePl,"pl"],[d.nameLat,"en"],[raw,"pl"],[d.namePl,"en"]].filter(t=>t[0]);
  for (const [q,l] of tries) { try { const u = await wikiImage(q,l); if (u) return u; } catch(e){} }
  return null;
}
/* ── generowane zdjęcie AI (Pollinations, bez klucza) ── */
function aiImageUrl(d, raw) {
  const subject = [d&&d.namePl, d&&d.nameLat].filter(Boolean).join(", ") || raw || "roślina";
  const prompt = `realistic photograph of ${subject}, whole plant, natural daylight, garden center product photo, sharp focus, high detail, no text, no watermark`;
  const seed = Math.floor(Math.random()*100000);
  return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=900&height=720&nologo=true&seed=${seed}`;
}

function extractPlant(data){
  if (data && typeof data==="object" && data.namePl) return data;
  let text="";
  if (data && data.content) text = data.content.map(b=>b.text||"").join("");
  else text = (data && (data.text||data.completion)) || (typeof data==="string"?data:JSON.stringify(data));
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

function Modal({ title, children, onClose }) {
  return (
    <div className="scrim no-print" onMouseDown={onClose}>
      <div className="modal" onMouseDown={(e)=>e.stopPropagation()}>
        <div className="modal-head"><h3>{title}</h3>
          <button className="x" onClick={onClose}><X size={18}/></button>
        </div>
        {children}
      </div>
    </div>
  );
}

const CARE = [
  { key:"light", label:"Stanowisko", Icon:Sun },
  { key:"water", label:"Podlewanie", Icon:Droplets },
  { key:"frost", label:"Mrozoodporność", Icon:Snowflake },
  { key:"height", label:"Wysokość", Icon:Ruler },
];

const load = (k,d)=>{ try { const v=localStorage.getItem(k); return v===null?d:v; } catch(e){ return d; } };

function App() {
  const [modal, setModal] = useState("name");
  const [nameInput, setNameInput] = useState("");
  const [priceInput, setPriceInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [data, setData] = useState(null);
  const [price, setPrice] = useState("");
  const [photo, setPhoto] = useState(null);
  const [photoLoading, setPhotoLoading] = useState(false);
  const [photoSource, setPhotoSource] = useState(null);
  const [photoFailed, setPhotoFailed] = useState(false);
  const [genId, setGenId] = useState(0);
  const [proxyUrl, setProxyUrl] = useState(()=>load("apsk_proxy",""));
  const [apiKey, setApiKey] = useState(()=>load("apsk_key",""));
  const [pInput, setPInput] = useState("");
  const [kInput, setKInput] = useState("");
  const fileRef = useRef(null);

  const edit = (k,v) => setData(d => ({ ...d, [k]: v }));

  async function loadWeb(d, raw) {
    setPhotoFailed(false); setPhotoLoading(true); setPhotoSource("web");
    const url = await findImage(d, raw);
    if (url) setPhoto(url);
    else { setPhoto(null); setPhotoLoading(false); setPhotoFailed(true); }
  }
  function genAI(d, raw) {
    setPhotoFailed(false); setPhotoLoading(true); setPhotoSource("ai");
    setPhoto(aiImageUrl(d, raw));
  }

  function openBlank(name){
    const blank = {namePl:name, nameLat:"", intro:"", light:"", water:"", frost:"", height:"", care:""};
    setData(blank); setGenId(n=>n+1); setPhoto(null); loadWeb(blank, name);
    setModal(price ? null : "price");
  }

  async function generate() {
    const name = nameInput.trim();
    if (!name) { setError("Wpisz nazwę rośliny."); return; }
    if (!proxyUrl && !apiKey) { openBlank(name); return; } // brak konfiguracji → pusta etykieta
    setLoading(true); setError("");
    try {
      let parsed;
      if (proxyUrl) {
        const res = await fetch(proxyUrl, { method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({ name, prompt: PROMPT(name) }) });
        parsed = extractPlant(await res.json());
      } else {
        const res = await fetch("https://api.anthropic.com/v1/messages", { method:"POST",
          headers:{ "Content-Type":"application/json", "x-api-key":apiKey,
                    "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
          body: JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:1000,
                                 messages:[{role:"user", content:PROMPT(name)}] }) });
        parsed = extractPlant(await res.json());
      }
      setData(parsed); setGenId(n=>n+1); setPhoto(null); loadWeb(parsed, name);
      setModal(price ? null : "price");
    } catch(e) {
      setError("Nie udało się wygenerować opisu. Sprawdź ustawienia (proxy/klucz) lub uściślij nazwę rośliny.");
    } finally { setLoading(false); }
  }

  function savePrice(){ setPrice(priceInput.trim()); setModal(null); }
  function openSettings(){ setPInput(proxyUrl); setKInput(apiKey); setModal("settings"); }
  function saveSettings(){
    const p=pInput.trim(), k=kInput.trim();
    setProxyUrl(p); setApiKey(k);
    try{ localStorage.setItem("apsk_proxy",p); localStorage.setItem("apsk_key",k); }catch(e){}
    setModal(data ? null : "name");
  }
  function onFile(e){
    const f = e.target.files && e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => { setPhoto(r.result); setPhotoSource("upload"); setPhotoLoading(false); setPhotoFailed(false); };
    r.readAsDataURL(f);
  }

  const hasCreds = !!(proxyUrl || apiKey);

  return (
    <div className="app">
      <input ref={fileRef} type="file" accept="image/*" onChange={onFile} style={{display:"none"}} />
      <div className="wrap">
        <div className="top no-print">
          <div className="brand">
            <div className="mark"><img src={LOGO} alt="Agra PSK" /></div>
            <div><div className="wm">Agra PSK</div><div className="sub">Generator etykiet roślin</div></div>
          </div>
          <div className="actions">
            {data && <>
              <button className="btn" onClick={()=>{ setNameInput(""); setModal("name"); }}><Sparkles size={15}/> Zmień roślinę</button>
              <button className="btn" onClick={()=>{ setPriceInput(price); setModal("price"); }}><Pencil size={15}/> Cena</button>
              <button className="btn primary" onClick={()=>window.print()}><Printer size={15}/> Drukuj / PDF</button>
            </>}
            <button className="btn" onClick={openSettings} title="Ustawienia generowania opisu"><Cog size={15}/></button>
          </div>
        </div>

        {!data && !modal && (
          <div className="start no-print">
            <div className="big">Ujednolicone opisy roślin</div>
            <p>Wpisz nazwę rośliny, a aplikacja przygotuje gotową, poziomą etykietę w stylu Agra PSK —
               z opisem, ceną i automatycznie pobranym zdjęciem.</p>
            <button className="btn primary" onClick={()=>setModal("name")}><Sparkles size={16}/> Nowy opis rośliny</button>
          </div>
        )}

        {data && (<>
          <div className="stage">
            <div className="card print-area" key={genId}>
              <div className="card-head">
                <div className="l">
                  <div className="leaf"><img src={LOGO} alt="Agra PSK"/></div>
                  <div><div className="name">Agra PSK</div><div className="eyebrow">Centrum Ogrodnicze · Kłodzko</div></div>
                </div>
                <div className="r">od 1991 · Kotlina Kłodzka<br/>naszogrodniczy.pl</div>
              </div>

              <div className="card-body">
                <div className="left">
                  <div className="pl-name" contentEditable suppressContentEditableWarning
                       onBlur={(e)=>edit("namePl", e.currentTarget.textContent)}>{data.namePl}</div>
                  <div className="lat-name" contentEditable suppressContentEditableWarning
                       onBlur={(e)=>edit("nameLat", e.currentTarget.textContent)}>{data.nameLat}</div>
                  <div className="intro" contentEditable suppressContentEditableWarning
                       onBlur={(e)=>edit("intro", e.currentTarget.textContent)}>{data.intro}</div>

                  <div className="care">
                    {CARE.map(({key,label,Icon})=>(
                      <div className="care-row" key={key}>
                        <div className="care-ic"><Icon size={15}/></div>
                        <div>
                          <div className="care-k">{label}</div>
                          <div className="care-v" contentEditable suppressContentEditableWarning
                               onBlur={(e)=>edit(key, e.currentTarget.textContent)}>{data[key]}</div>
                        </div>
                      </div>
                    ))}
                  </div>

                  <div className="price-tag">
                    <span className="cap">Cena</span>
                    <span className="val">
                      <span className="num" contentEditable suppressContentEditableWarning
                            onBlur={(e)=>setPrice(e.currentTarget.textContent)}>{price || "—"}</span>
                      <span className="cur">zł</span>
                    </span>
                  </div>
                </div>

                <div className="right">
                  {photo && (
                    <img className="photo" src={photo} alt={data.namePl}
                         onLoad={()=>setPhotoLoading(false)}
                         onError={()=>{ setPhoto(null); setPhotoLoading(false); setPhotoFailed(true); }} />
                  )}
                  {photoLoading && (
                    <div className="photo-loading">
                      <Loader size={26}/>
                      <div style={{fontSize:12.5,fontWeight:500}}>
                        {photoSource==="ai" ? "Generuję zdjęcie AI…" : "Szukam zdjęcia rośliny…"}
                      </div>
                    </div>
                  )}
                  {!photo && !photoLoading && (
                    <div className="photo-empty" onClick={()=>fileRef.current && fileRef.current.click()}>
                      <ImagePlus size={30}/>
                      <div style={{fontSize:13,fontWeight:500}}>{photoFailed ? "Nie udało się pobrać ani wygenerować" : "Brak zdjęcia"}</div>
                      <div style={{fontSize:11}}>użyj przycisków poniżej lub kliknij, aby wgrać</div>
                    </div>
                  )}
                  {photo && !photoLoading && photoSource!=="upload" && (
                    <div className="photo-credit">{photoSource==="ai" ? "zdjęcie wygenerowane AI" : "źródło: Wikimedia"}</div>
                  )}
                  <div className="photo-tools no-print">
                    <button onClick={()=>loadWeb(data, nameInput||data.namePl)} title="Pobierz prawdziwe zdjęcie z sieci"><Globe size={14}/> Sieć</button>
                    <button onClick={()=>genAI(data, nameInput||data.namePl)} title="Wygeneruj zdjęcie AI"><Wand size={14}/> Generuj AI</button>
                    <button onClick={()=>fileRef.current && fileRef.current.click()} title="Wgraj własne zdjęcie"><ImagePlus size={14}/> Wgraj</button>
                  </div>
                </div>
              </div>

              <div className="card-foot">
                <span className="tag">Twój ogród zasługuje na najlepsze</span>
                <span className="care-note">{data.care}</span>
              </div>
            </div>
          </div>
          <div className="hint no-print"><Pencil size={13}/> Kliknij dowolny tekst na karcie, aby go poprawić · zdjęcie zmienisz przyciskami „Sieć" / „Generuj AI" / „Wgraj".</div>
        </>)}
      </div>

      {modal==="name" && (
        <Modal title="Jaka to roślina?" onClose={()=>setModal(null)}>
          <div className="modal-body">
            <label>Nazwa rośliny</label>
            <input className="field" autoFocus value={nameInput}
                   placeholder="np. pomidor, Monstera dziurawa, hortensja…"
                   onChange={(e)=>setNameInput(e.target.value)}
                   onKeyDown={(e)=>e.key==="Enter" && !loading && generate()} />
            <div className="modal-note">
              {hasCreds
                ? "AI przygotuje ujednolicony opis, a aplikacja pobierze zdjęcie rośliny."
                : "Bez ustawionego klucza/proxy aplikacja otworzy pustą, edytowalną etykietę — opis uzupełnisz ręcznie. Aby opis powstawał automatycznie, ustaw klucz lub proxy w ⚙."}
            </div>
            {error && <div className="err">{error}</div>}
          </div>
          <div className="modal-foot">
            <button className="btn" onClick={()=>setModal(null)}>Anuluj</button>
            <button className="btn primary" onClick={generate} disabled={loading}>
              {loading ? <><Loader size={15}/> Generuję…</> : <>{hasCreds ? "Generuj opis" : "Utwórz etykietę"} <ArrowRight size={15}/></>}
            </button>
          </div>
        </Modal>
      )}

      {modal==="price" && (
        <Modal title="Jaka ma być cena?" onClose={()=>setModal(null)}>
          <div className="modal-body">
            <label>Cena detaliczna</label>
            <div className="price-row">
              <input className="field" autoFocus inputMode="decimal" value={priceInput}
                     placeholder="np. 49,99" onChange={(e)=>setPriceInput(e.target.value)}
                     onKeyDown={(e)=>e.key==="Enter" && savePrice()} />
              <div className="cur">zł</div>
            </div>
            <div className="modal-note">Cena pojawi się po lewej stronie karty, pod opisem rośliny.</div>
          </div>
          <div className="modal-foot">
            <button className="btn" onClick={()=>setModal(null)}>Pomiń</button>
            <button className="btn primary" onClick={savePrice}>Zapisz cenę</button>
          </div>
        </Modal>
      )}

      {modal==="settings" && (
        <Modal title="Ustawienia generowania opisu" onClose={()=>setModal(data?null:"name")}>
          <div className="modal-body">
            <div className="settings-field">
              <label>Adres backendu / proxy (zalecane)</label>
              <input className="field" value={pInput} placeholder="https://twoja-apka.vercel.app/api/generate"
                     onChange={(e)=>setPInput(e.target.value)} />
            </div>
            <div className="or">albo</div>
            <div className="settings-field">
              <label>Klucz Anthropic (tylko lokalnie)</label>
              <input className="field" type="password" value={kInput} placeholder="sk-ant-…"
                     onChange={(e)=>setKInput(e.target.value)} />
              <div className="warn">Klucz wpisany tutaj zostaje tylko w tej przeglądarce. Używaj go wyłącznie na komputerze firmowym / stronie niepublicznej — nigdy na publicznie dostępnej stronie, bo każdy mógłby go odczytać. Na hosting użyj proxy.</div>
            </div>
          </div>
          <div className="modal-foot">
            <button className="btn" onClick={()=>setModal(data?null:"name")}>Anuluj</button>
            <button className="btn primary" onClick={saveSettings}>Zapisz</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
} catch (e) {
  document.getElementById("root").innerHTML =
    '<pre style="white-space:pre-wrap;color:#ffb4b4;font-family:monospace;max-width:680px;margin:40px auto;padding:20px;background:#15241A;border-radius:10px">Błąd uruchomienia aplikacji:\n\n' +
    ((e && e.stack) || e) + '</pre>';
}
</script>
<script>
window.addEventListener('load', function(){
  setTimeout(function(){
    var root = document.getElementById('root');
    if (root && root.querySelector('.app')) return; // wystartowała poprawnie
    var miss = (window.__fail||[]).slice();
    if (!window.React && miss.indexOf('React')<0) miss.push('React');
    if (!window.ReactDOM && miss.indexOf('ReactDOM')<0) miss.push('ReactDOM');
    if (!window.Babel && miss.indexOf('Babel')<0) miss.push('Babel (transpiler)');
    var msg = miss.length
      ? 'Nie załadowały się biblioteki: <b>' + miss.join(', ') + '</b>.<br>Najczęstsze przyczyny: brak dostępu do internetu na tej stronie, blokada (adblock / sieć firmowa), albo chwilowy problem z CDN unpkg.com.'
      : 'Biblioteki załadowały się, ale aplikacja nie wystartowała — to błąd w skrypcie. Otwórz konsolę przeglądarki (F12 → Console) i prześlij pierwszy czerwony błąd.';
    root.innerHTML = '<div style="color:#E7EDE6;font-family:system-ui,sans-serif;max-width:600px;margin:60px auto;padding:24px;border:1px solid #3a513f;border-radius:12px;background:#15241A;line-height:1.6">⚠️ Aplikacja się nie uruchomiła.<br><br>' + msg + '</div>';
  }, 7000);
});
</script>
</body>
</html>
