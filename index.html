<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Agra PSK · Generator etykiet roślin</title>
<style>
html,body{margin:0;padding:0;}

@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&display=swap');

.app, .app * { box-sizing: border-box; }
.app {
  --ink:#15241A; --forest:#1E3A28; --forest-2:#274A33;
  --paper:#F5EFE1; --paper-2:#EBE2CE; --paper-line:rgba(21,36,26,.14);
  --brass:#A9842E; --brass-l:#CDA24A; --sage:#6E8B6A; --leaf:#8BC34A;
  font-family:'Inter',system-ui,sans-serif;
  min-height:100vh; color:#E7EDE6;
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(105,139,106,.18), transparent 60%),
    linear-gradient(160deg,#13211A 0%,#0E1813 100%);
  padding:28px 20px 64px;
}
.wrap { max-width:1040px; margin:0 auto; }

/* top bar */
.top { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:26px; flex-wrap:wrap; }
.brand { display:flex; align-items:center; gap:13px; }
.brand .mark {
  width:46px; height:46px; border-radius:12px; display:grid; place-items:center;
  background:linear-gradient(150deg,var(--forest-2),var(--forest));
  border:1px solid rgba(139,195,74,.4);
}
.brand .mark img { width:32px; height:32px; object-fit:contain; }
.brand .wm { font-family:'Fraunces',serif; font-weight:600; font-size:22px; letter-spacing:.3px; color:#F4EFE2; line-height:1; }
.brand .sub { font-size:11px; letter-spacing:2.5px; text-transform:uppercase; color:#8FA890; margin-top:4px; }

.actions { display:flex; gap:10px; flex-wrap:wrap; }
.btn {
  font-family:'Inter',sans-serif; font-size:13.5px; font-weight:500; cursor:pointer;
  border-radius:10px; padding:10px 15px; display:inline-flex; align-items:center; gap:8px;
  border:1px solid rgba(231,237,230,.16); background:rgba(255,255,255,.04); color:#E7EDE6;
  transition:.15s;
}
.btn:hover { background:rgba(255,255,255,.09); border-color:rgba(231,237,230,.3); }
.btn:disabled { opacity:.45; cursor:not-allowed; }
.btn.primary {
  background:linear-gradient(150deg,var(--brass-l),var(--brass)); color:#1c1505;
  border-color:transparent; font-weight:600;
}
.btn.primary:hover { filter:brightness(1.06); }

/* ── the plant card (the deliverable) — ZAWSZE POZIOMO ── */
.stage { display:grid; place-items:center; }
.card {
  width:100%; max-width:1000px; aspect-ratio:1.5/1; min-width:0;
  background:var(--paper); color:var(--ink); border-radius:14px; overflow:hidden;
  box-shadow:0 30px 60px -24px rgba(0,0,0,.6), 0 2px 0 rgba(255,255,255,.04) inset;
  display:flex; flex-direction:column; position:relative;
}
.card-head {
  background:linear-gradient(95deg,var(--forest) 0%,var(--forest-2) 100%);
  color:#F2EDDE; padding:13px 26px; display:flex; align-items:center; justify-content:space-between;
  border-bottom:2px solid var(--brass);
}
.card-head .l { display:flex; align-items:center; gap:12px; }
.card-head .leaf { width:34px; height:34px; border-radius:9px; display:grid; place-items:center;
  background:#F3EEDF; }
.card-head .leaf img { width:26px; height:26px; object-fit:contain; }
.card-head .name { font-family:'Fraunces',serif; font-weight:600; font-size:19px; letter-spacing:.4px; }
.card-head .eyebrow { font-size:9.5px; letter-spacing:3px; text-transform:uppercase; color:#A9C0A8; margin-top:2px; }
.card-head .r { text-align:right; font-size:10px; letter-spacing:.5px; color:#BFD2BD; line-height:1.5; }

.card-body { flex:1; display:grid; grid-template-columns:1.32fr 1fr; }

/* left: opis + cena */
.left { padding:20px 24px 18px; display:flex; flex-direction:column; }
.pl-name { font-family:'Fraunces',serif; font-weight:600; font-size:clamp(20px,3vw,30px); line-height:1.04; color:var(--ink); }
.lat-name { font-family:'Fraunces',serif; font-style:italic; font-weight:400; font-size:clamp(12px,1.7vw,16px); color:var(--brass); margin-top:3px; }
.intro { font-size:clamp(11px,1.3vw,12.5px); line-height:1.5; color:#33473A; margin-top:11px; }

.care { margin-top:auto; padding-top:14px; display:grid; grid-template-columns:1fr 1fr; gap:9px 16px; }
.care-row { display:flex; gap:10px; align-items:flex-start; }
.care-ic { width:26px; height:26px; flex:none; border-radius:7px; display:grid; place-items:center;
  background:var(--paper-2); color:var(--sage); border:1px solid var(--paper-line); }
.care-k { font-size:9px; letter-spacing:1.6px; text-transform:uppercase; color:#7E8E7B; }
.care-v { font-size:clamp(10.5px,1.2vw,12px); font-weight:500; color:#2A3B2F; line-height:1.25; }

.price-tag { margin-top:12px; display:flex; align-items:center; justify-content:space-between;
  background:var(--ink); color:#F3EEDF; border-radius:11px; padding:11px 16px; }
.price-tag .cap { font-size:10px; letter-spacing:2.5px; text-transform:uppercase; color:#9FB39C; }
.price-tag .val { font-family:'Fraunces',serif; font-weight:600; }
.price-tag .num { font-size:clamp(20px,2.6vw,28px); line-height:1; }
.price-tag .cur { font-size:15px; color:var(--brass-l); margin-left:5px; }

/* right: zdjęcie */
.right { position:relative; background:var(--paper-2); border-left:1px solid var(--paper-line); overflow:hidden; }
.photo { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
.photo-empty { position:absolute; inset:0; display:flex; flex-direction:column; gap:9px;
  align-items:center; justify-content:center; color:#8a8568; cursor:pointer;
  border:2px dashed rgba(21,36,26,.18); margin:14px; border-radius:11px; text-align:center; padding:14px; }
.photo-empty:hover { color:var(--brass); border-color:var(--brass); }
.photo-loading { position:absolute; inset:0; display:flex; flex-direction:column; gap:11px;
  align-items:center; justify-content:center; color:#5d7359;
  background:repeating-linear-gradient(135deg,#EBE2CE,#EBE2CE 12px,#E4DAC2 12px,#E4DAC2 24px); }
.photo-tools { position:absolute; right:12px; bottom:12px; display:flex; gap:7px; flex-wrap:wrap; justify-content:flex-end; max-width:80%; }
.photo-tools button { cursor:pointer; background:rgba(21,36,26,.78); color:#F3EEDF; border:none;
  border-radius:9px; padding:8px 11px; font-size:12px; display:flex; align-items:center; gap:7px; backdrop-filter:blur(2px); }
.photo-tools button:hover { background:rgba(21,36,26,.95); }
.photo-credit { position:absolute; left:10px; bottom:10px; font-size:9px; letter-spacing:.4px;
  color:#fff; background:rgba(21,36,26,.55); padding:3px 7px; border-radius:6px; }

.card-foot { background:var(--paper-2); border-top:1px solid var(--paper-line);
  padding:8px 26px; display:flex; align-items:center; justify-content:space-between; gap:16px;
  font-size:10px; letter-spacing:.4px; color:#7E8E7B; }
.card-foot .tag { font-style:italic; white-space:nowrap; }
.card-foot .care-note { text-align:right; }

[contenteditable]:focus { outline:2px solid var(--brass-l); outline-offset:2px; border-radius:4px; }

/* start state */
.start { text-align:center; padding:60px 24px; }
.start .big { font-family:'Fraunces',serif; font-size:30px; color:#F3EEE2; font-weight:600; }
.start p { color:#9FB39C; max-width:440px; margin:12px auto 26px; line-height:1.6; font-size:14.5px; }

.hint { text-align:center; color:#7E9079; font-size:12px; margin-top:14px; display:flex;
  gap:7px; align-items:center; justify-content:center; }

/* modal */
.scrim { position:fixed; inset:0; background:rgba(8,14,10,.62); backdrop-filter:blur(3px);
  display:grid; place-items:center; padding:20px; z-index:50; }
.modal { width:100%; max-width:440px; background:var(--paper); color:var(--ink);
  border-radius:16px; overflow:hidden; box-shadow:0 24px 60px -16px rgba(0,0,0,.7); }
.modal-head { background:linear-gradient(95deg,var(--forest),var(--forest-2)); color:#F2EDDE;
  padding:16px 20px; display:flex; align-items:center; justify-content:space-between;
  border-bottom:2px solid var(--brass); }
.modal-head h3 { font-family:'Fraunces',serif; font-weight:600; font-size:18px; margin:0; }
.modal-head .x { cursor:pointer; color:#C6D6C4; background:none; border:none; padding:4px; display:grid; place-items:center; border-radius:6px; }
.modal-head .x:hover { background:rgba(255,255,255,.12); color:#fff; }
.modal-body { padding:20px; }
.modal-body label { display:block; font-size:11px; letter-spacing:1.6px; text-transform:uppercase; color:#7E8E7B; margin-bottom:8px; }
.field { width:100%; font-family:'Inter',sans-serif; font-size:15px; color:var(--ink);
  background:#fff; border:1px solid var(--paper-line); border-radius:10px; padding:12px 14px; }
.field:focus { outline:2px solid var(--brass-l); outline-offset:1px; border-color:var(--brass); }
.price-row { display:flex; gap:10px; align-items:stretch; }
.price-row .cur { display:grid; place-items:center; padding:0 16px; background:var(--ink);
  color:var(--brass-l); border-radius:10px; font-family:'Fraunces',serif; font-size:16px; }
.modal-note { font-size:12px; color:#7E8E7B; margin-top:12px; line-height:1.5; }
.modal-foot { padding:14px 20px 18px; display:flex; gap:10px; justify-content:flex-end; background:var(--paper-2); border-top:1px solid var(--paper-line); }
.modal .btn { color:var(--ink); border-color:var(--paper-line); background:#fff; }
.modal .btn:hover { background:#fff; border-color:var(--brass); }
.modal .btn.primary { color:#1c1505; background:linear-gradient(150deg,var(--brass-l),var(--brass)); border-color:transparent; }
.err { background:#fbeaea; color:#8a2b2b; border:1px solid #e7c4c4; border-radius:9px; padding:10px 12px; font-size:13px; margin-top:12px; }
.spin { animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* print: tylko karta, poziomo */
@media print {
  @page { size:A4 landscape; margin:12mm; }
  body { background:#fff; }
  .app { background:#fff!important; padding:0; }
  .no-print { display:none!important; }
  .stage { display:block; }
  .card { box-shadow:none; max-width:100%; border:1px solid #ccc; aspect-ratio:1.5/1; }
}


/* dodatki */
:root{
  --ink:#15241A; --forest:#1E3A28; --forest-2:#274A33;
  --paper:#F5EFE1; --paper-2:#EBE2CE; --paper-line:rgba(21,36,26,.14);
  --brass:#A9842E; --brass-l:#CDA24A; --sage:#6E8B6A; --leaf:#8BC34A;
}
.scrim, .scrim *{ box-sizing:border-box; }
.settings-field{margin-bottom:14px;}
.settings-field:last-child{margin-bottom:0;}
.warn{background:#fff6e6;color:#7a5a16;border:1px solid #e6d3a6;border-radius:9px;padding:10px 12px;font-size:12px;line-height:1.5;margin-top:4px;}
.or{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#7E8E7B;text-align:center;margin:10px 0;}
.boot{color:#9FB39C;font-family:system-ui,sans-serif;padding:48px;text-align:center;}
</style>
</head>

  function load(k,d){ try{ var v=localStorage.getItem(k); return v===null?d:v; }catch(e){ return d; } }
  function store(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
  var state = {
    data:null, price:"", photo:null, photoLoading:false, photoSource:null, photoFailed:false,
    lastName:"", proxyUrl: load("apsk_proxy",""), apiKey: load("apsk_key","")
  };
  function hasCreds(){ return !!(state.proxyUrl || state.apiKey); }

  function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];}); }
  function el(html){ var t=document.createElement("template"); t.innerHTML=String(html).trim(); return t.content.firstChild; }

  var CARE = [
    {key:"light", label:"Stanowisko",     icon:IC.sun},
    {key:"water", label:"Podlewanie",     icon:IC.drop},
    {key:"frost", label:"Mrozoodporność", icon:IC.snow},
    {key:"height",label:"Wysokość",       icon:IC.ruler}
  ];

  function PROMPT(name){
    return 'Jesteś doświadczonym ogrodnikiem przygotowującym ujednolicone etykiety roślin dla centrum ogrodniczego "Agra PSK" w Kłodzku.\n'
      + 'Na podstawie nazwy rośliny przygotuj zwięzły, rzetelny i poprawny merytorycznie opis na etykietę sprzedażową.\n'
      + 'Zwróć WYŁĄCZNIE obiekt JSON (bez komentarzy, bez znaczników), dokładnie wg schematu:\n'
      + '{\n'
      + ' "namePl": "polska nazwa zwyczajowa",\n'
      + ' "nameLat": "nazwa łacińska (rodzaj i gatunek)",\n'
      + ' "intro": "maks. 2 krótkie zdania, łącznie do 25 słów, rzeczowe i zachęcające",\n'
      + ' "light": "wymagania świetlne, maks. 4 słowa",\n'
      + ' "water": "podlewanie, maks. 4 słowa",\n'
      + ' "frost": "mrozoodporność lub strefa, maks. 4 słowa",\n'
      + ' "height": "docelowa wysokość, maks. 4 słowa",\n'
      + ' "care": "jedna krótka wskazówka, maks. 12 słów; jeśli roślina jest trująca dla ludzi lub zwierząt — koniecznie to zaznacz"\n'
      + '}\n'
      + 'Roślina podana przez sprzedawcę: "'+name+'"\n'
      + 'Pisz po polsku.';
  }

  /* ---------- zdjęcia ---------- */
  function wikiImage(query, lang){
    var params = "action=query&format=json&generator=search&gsrsearch="+encodeURIComponent(query)
      + "&gsrlimit=1&prop=pageimages&piprop=thumbnail&pithumbsize=1000&redirects=1&origin=*";
    return fetch("https://"+lang+".wikipedia.org/w/api.php?"+params).then(function(r){return r.json();}).then(function(j){
      var pages = j && j.query && j.query.pages; if(!pages) return null;
      var arr = Object.keys(pages).map(function(k){return pages[k];}).sort(function(a,b){return (a.index||0)-(b.index||0);});
      var first = arr[0];
      return (first && first.thumbnail && first.thumbnail.source) || null;
    });
  }
  function findImage(d, raw){
    var tries = [[d.nameLat,"pl"],[d.namePl,"pl"],[d.nameLat,"en"],[raw,"pl"],[d.namePl,"en"]].filter(function(t){return t[0];});
    var i = 0;
    function next(){
      if(i>=tries.length) return Promise.resolve(null);
      var t = tries[i++];
      return wikiImage(t[0],t[1]).then(function(u){ return u || next(); }, function(){ return next(); });
    }
    return next();
  }
  function aiImageUrl(d, raw){
    var subject = [d&&d.namePl, d&&d.nameLat].filter(Boolean).join(", ") || raw || "roślina";
    var prompt = "realistic photograph of "+subject+", whole plant, natural daylight, garden center product photo, sharp focus, high detail, no text, no watermark";
    var seed = Math.floor(Math.random()*100000);
    return "https://image.pollinations.ai/prompt/"+encodeURIComponent(prompt)+"?width=900&height=720&nologo=true&seed="+seed;
  }
  function extractPlant(data){
    if(data && typeof data==="object" && data.namePl) return data;
    var text="";
    if(data && data.content) text = data.content.map(function(b){return b.text||"";}).join("");
    else if(typeof data==="string") text = data;
    else text = (data && (data.text||data.completion)) || "";
    text = String(text).replace(/```json|```/g,"").trim();
    var s=text.indexOf("{"), e=text.lastIndexOf("}");
    if(s>=0 && e>s) text = text.slice(s, e+1);
    return JSON.parse(text);
  }

  /* ---------- render ---------- */
  var root = document.getElementById("root");

  function topBar(){
    var actions = "";
    if(state.data){
      actions += '<button class="btn" data-top="name">'+svg(IC.spark,15)+' Zmień roślinę</button>'
              +  '<button class="btn" data-top="price">'+svg(IC.pencil,15)+' Cena</button>'
              +  '<button class="btn primary" data-top="print">'+svg(IC.print,15)+' Drukuj / PDF</button>';
    }
    actions += '<button class="btn" data-top="settings" title="Ustawienia generowania opisu">'+svg(IC.cog,15)+'</button>';
    return '<div class="top no-print"><div class="brand"><div class="mark"><img src="'+LOGO+'" alt="Agra PSK"></div>'
      + '<div><div class="wm">Agra PSK</div><div class="sub">Generator etykiet roślin</div></div></div>'
      + '<div class="actions">'+actions+'</div></div>';
  }

  function startHTML(){
    return '<div class="start no-print"><div class="big">Ujednolicone opisy roślin</div>'
      + '<p>Wpisz nazwę rośliny, a aplikacja przygotuje gotową, poziomą etykietę w stylu Agra PSK — z opisem, ceną i automatycznie pobranym zdjęciem.</p>'
      + '<button class="btn primary" id="startBtn">'+svg(IC.spark,16)+' Nowy opis rośliny</button></div>';
  }

  function cardHTML(){
    var d = state.data;
    var care = CARE.map(function(c){
      return '<div class="care-row"><div class="care-ic">'+svg(c.icon,15)+'</div>'
        + '<div><div class="care-k">'+c.label+'</div>'
        + '<div class="care-v" contenteditable data-k="'+c.key+'">'+esc(d[c.key]||"")+'</div></div></div>';
    }).join("");
    return '<div class="stage"><div class="card print-area">'
      + '<div class="card-head"><div class="l"><div class="leaf"><img src="'+LOGO+'" alt="Agra PSK"></div>'
      +   '<div><div class="name">Agra PSK</div><div class="eyebrow">Centrum Ogrodnicze · Kłodzko</div></div></div>'
      +   '<div class="r">od 1991 · Kotlina Kłodzka<br>naszogrodniczy.pl</div></div>'
      + '<div class="card-body"><div class="left">'
      +   '<div class="pl-name" contenteditable data-k="namePl">'+esc(d.namePl||"")+'</div>'
      +   '<div class="lat-name" contenteditable data-k="nameLat">'+esc(d.nameLat||"")+'</div>'
      +   '<div class="intro" contenteditable data-k="intro">'+esc(d.intro||"")+'</div>'
      +   '<div class="care">'+care+'</div>'
      +   '<div class="price-tag"><span class="cap">Cena</span><span class="val">'
      +     '<span class="num" contenteditable data-price="1">'+esc(state.price||"—")+'</span><span class="cur">zł</span></span></div>'
      + '</div><div class="right" id="photo"></div></div>'
      + '<div class="card-foot"><span class="tag">Twój ogród zasługuje na najlepsze</span>'
      +   '<span class="care-note" data-k="care" contenteditable>'+esc(d.care||"")+'</span></div>'
      + '</div></div>'
      + '<div class="hint no-print">'+svg(IC.pencil,13)+' Kliknij dowolny tekst na karcie, aby go poprawić · zdjęcie zmienisz przyciskami „Sieć” / „Generuj AI” / „Wgraj”.</div>';
  }

  function mount(){
    root.innerHTML = '<div class="app"><div class="wrap">' + topBar() + (state.data ? cardHTML() : startHTML()) + '</div></div>';
    wireTop();
    if(state.data){ wireCard(); updatePhoto(); }
  }

  function wireTop(){
    var btns = root.querySelectorAll("[data-top]");
    for(var i=0;i<btns.length;i++){
      (function(b){
        b.onclick = function(){
          var t=b.getAttribute("data-top");
          if(t==="name") openName();
          else if(t==="price") openPrice();
          else if(t==="print") window.print();
          else if(t==="settings") openSettings();
        };
      })(btns[i]);
    }
    var sb = document.getElementById("startBtn"); if(sb) sb.onclick = openName;
  }

  function wireCard(){
    var eds = root.querySelectorAll("[data-k]");
    for(var i=0;i<eds.length;i++){
      (function(n){ n.addEventListener("blur", function(){ if(state.data) state.data[n.getAttribute("data-k")] = n.textContent; }); })(eds[i]);
    }
    var p = root.querySelector("[data-price]");
    if(p) p.addEventListener("blur", function(){ state.price = p.textContent; });
  }

  function updatePhoto(){
    var box = document.getElementById("photo"); if(!box) return;
    var html = "";
    if(state.photo) html += '<img class="photo" id="photoImg" src="'+state.photo+'" alt="">';
    if(state.photoLoading)
      html += '<div class="photo-loading">'+svg(IC.loader,26,"spin")+'<div style="font-size:12.5px;font-weight:500">'+(state.photoSource==="ai"?"Generuję zdjęcie AI…":"Szukam zdjęcia rośliny…")+'</div></div>';
    if(!state.photo && !state.photoLoading)
      html += '<div class="photo-empty" id="photoEmpty">'+svg(IC.img,30)+'<div style="font-size:13px;font-weight:500">'+(state.photoFailed?"Nie udało się pobrać ani wygenerować":"Brak zdjęcia")+'</div><div style="font-size:11px">użyj przycisków poniżej lub kliknij, aby wgrać</div></div>';
    if(state.photo && !state.photoLoading && state.photoSource!=="upload")
      html += '<div class="photo-credit">'+(state.photoSource==="ai"?"zdjęcie wygenerowane AI":"źródło: Wikimedia")+'</div>';
    html += '<div class="photo-tools no-print">'
      + '<button data-act="web">'+svg(IC.globe,14)+' Sieć</button>'
      + '<button data-act="ai">'+svg(IC.wand,14)+' Generuj AI</button>'
      + '<button data-act="upload">'+svg(IC.img,14)+' Wgraj</button></div>';
    box.innerHTML = html;

    var img = document.getElementById("photoImg");
    if(img){
      img.onload = function(){ state.photoLoading=false; updatePhoto(); };
      img.onerror = function(){ state.photo=null; state.photoLoading=false; state.photoFailed=true; updatePhoto(); };
    }
    var empty = document.getElementById("photoEmpty"); if(empty) empty.onclick = pickFile;
    var tb = box.querySelectorAll(".photo-tools button");
    for(var i=0;i<tb.length;i++){
      (function(b){ b.onclick = function(){ var a=b.getAttribute("data-act"); if(a==="web") loadWeb(); else if(a==="ai") genAI(); else pickFile(); }; })(tb[i]);
    }
  }

  /* ---------- akcje zdjęcia ---------- */
  function curName(){ return state.lastName || (state.data && state.data.namePl) || ""; }
  function loadWeb(raw){
    raw = raw || curName();
    state.photoFailed=false; state.photoLoading=true; state.photoSource="web"; updatePhoto();
    findImage(state.data, raw).then(function(url){
      if(url){ state.photo=url; updatePhoto(); }
      else { state.photo=null; state.photoLoading=false; state.photoFailed=true; updatePhoto(); }
    });
  }
  function genAI(){
    state.photoFailed=false; state.photoLoading=true; state.photoSource="ai";
    state.photo = aiImageUrl(state.data, curName()); updatePhoto();
  }
  function pickFile(){ document.getElementById("file").click(); }
  document.getElementById("file").addEventListener("change", function(e){
    var f = e.target.files && e.target.files[0]; if(!f) return;
    var r = new FileReader();
    r.onload = function(){ state.photo = r.result; state.photoSource="upload"; state.photoLoading=false; state.photoFailed=false; updatePhoto(); };
    r.readAsDataURL(f);
    e.target.value = "";
  });

  /* ---------- modale ---------- */
  var curOverlay = null;
  function closeModal(){ if(curOverlay){ curOverlay.remove(); curOverlay=null; } }
  function overlay(title, inner){
    closeModal();
    var ov = el('<div class="scrim no-print"><div class="modal"><div class="modal-head"><h3>'+esc(title)+'</h3>'
      + '<button class="x" data-close>'+svg(IC.x,18)+'</button></div>'+inner+'</div></div>');
    ov.addEventListener("mousedown", function(e){ if(e.target===ov) closeModal(); });
    ov.querySelector(".modal").addEventListener("mousedown", function(e){ e.stopPropagation(); });
    var cl = ov.querySelectorAll("[data-close]");
    for(var i=0;i<cl.length;i++) cl[i].addEventListener("click", closeModal);
    document.body.appendChild(ov);
    curOverlay = ov;
    return ov;
  }

  function openName(){
    var note = hasCreds()
      ? "AI przygotuje ujednolicony opis, a aplikacja pobierze zdjęcie rośliny."
      : "Bez ustawionego klucza/proxy aplikacja otworzy pustą, edytowalną etykietę — opis uzupełnisz ręcznie. Aby opis powstawał automatycznie, ustaw klucz lub proxy w ⚙.";
    var ov = overlay("Jaka to roślina?",
      '<div class="modal-body"><label>Nazwa rośliny</label>'
      + '<input class="field" id="nameInput" placeholder="np. pomidor, Monstera dziurawa, hortensja…">'
      + '<div class="modal-note">'+note+'</div>'
      + '<div class="err" id="nameErr" style="display:none"></div></div>'
      + '<div class="modal-foot"><button class="btn" data-close>Anuluj</button>'
      + '<button class="btn primary" id="genBtn">'+(hasCreds()?"Generuj opis":"Utwórz etykietę")+' '+svg(IC.arrow,15)+'</button></div>');
    var input = ov.querySelector("#nameInput"); input.focus();
    input.addEventListener("keydown", function(e){ if(e.key==="Enter") go(); });
    ov.querySelector("#genBtn").onclick = go;
    function go(){
      var name = input.value.trim();
      if(!name){ showErr("Wpisz nazwę rośliny."); return; }
      var btn = ov.querySelector("#genBtn"); btn.disabled = true; btn.innerHTML = svg(IC.loader,15,"spin")+" Generuję…";
      generate(name, function(ok, msg){
        if(!ok){ btn.disabled=false; btn.innerHTML=(hasCreds()?"Generuj opis":"Utwórz etykietę"); showErr(msg||"Nie udało się."); }
      });
    }
    function showErr(m){ var e=ov.querySelector("#nameErr"); e.textContent=m; e.style.display=""; }
  }

  function openPrice(){
    var ov = overlay("Jaka ma być cena?",
      '<div class="modal-body"><label>Cena detaliczna</label>'
      + '<div class="price-row"><input class="field" id="priceInput" inputmode="decimal" placeholder="np. 49,99" value="'+esc(state.price)+'"><div class="cur">zł</div></div>'
      + '<div class="modal-note">Cena pojawi się po lewej stronie karty, pod opisem rośliny.</div></div>'
      + '<div class="modal-foot"><button class="btn" data-close>Pomiń</button><button class="btn primary" id="savePrice">Zapisz cenę</button></div>');
    var inp = ov.querySelector("#priceInput"); inp.focus();
    inp.addEventListener("keydown", function(e){ if(e.key==="Enter") save(); });
    ov.querySelector("#savePrice").onclick = save;
    function save(){ state.price = inp.value.trim(); closeModal(); mount(); }
  }

  function openSettings(){
    var ov = overlay("Ustawienia generowania opisu",
      '<div class="modal-body">'
      + '<div class="settings-field"><label>Adres backendu / proxy (zalecane)</label>'
      +   '<input class="field" id="proxyInput" placeholder="https://twoja-apka.vercel.app/api/generate" value="'+esc(state.proxyUrl)+'"></div>'
      + '<div class="or">albo</div>'
      + '<div class="settings-field"><label>Klucz Anthropic (tylko lokalnie)</label>'
      +   '<input class="field" id="keyInput" type="password" placeholder="sk-ant-…" value="'+esc(state.apiKey)+'">'
      +   '<div class="warn">Klucz wpisany tutaj zostaje tylko w tej przeglądarce. Używaj go wyłącznie na komputerze firmowym / stronie niepublicznej — nigdy na publicznie dostępnej stronie. Na hosting użyj proxy.</div></div>'
      + '</div>'
      + '<div class="modal-foot"><button class="btn" data-close>Anuluj</button><button class="btn primary" id="saveSet">Zapisz</button></div>');
    ov.querySelector("#saveSet").onclick = function(){
      state.proxyUrl = ov.querySelector("#proxyInput").value.trim();
      state.apiKey   = ov.querySelector("#keyInput").value.trim();
      store("apsk_proxy", state.proxyUrl); store("apsk_key", state.apiKey);
      closeModal();
      if(!state.data) openName();
    };
  }

  /* ---------- generowanie opisu ---------- */
  function openBlank(name){
    state.lastName = name;
    state.data = {namePl:name, nameLat:"", intro:"", light:"", water:"", frost:"", height:"", care:""};
    closeModal(); mount(); state.photo=null; loadWeb(name);
    if(!state.price) openPrice();
  }
  function generate(name, cb){
    state.lastName = name;
    if(!state.proxyUrl && !state.apiKey){ openBlank(name); return; }
    var req;
    if(state.proxyUrl){
      req = fetch(state.proxyUrl, {method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({name:name, prompt:PROMPT(name)})});
    } else {
      req = fetch("https://api.anthropic.com/v1/messages", {method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":state.apiKey,
          "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body: JSON.stringify({model:"claude-sonnet-4-6", max_tokens:1000, messages:[{role:"user", content:PROMPT(name)}]})});
    }
    req.then(function(r){
      return r.text().then(function(t){
        var d; try{ d=JSON.parse(t); }catch(e){ d=t; }
        return { status:r.status, data:d };
      });
    }).then(function(resp){
      var data = resp.data;
      if(data && data.error){
        var m = (typeof data.error==="string") ? data.error : (data.error.message || JSON.stringify(data.error));
        throw new Error(m);
      }
      if(resp.status >= 400){
        throw new Error("HTTP "+resp.status+((typeof data==="string") ? (" — "+data.slice(0,200)) : ""));
      }
      var parsed = extractPlant(data);
      state.data = parsed; closeModal(); mount(); state.photo=null; loadWeb(name);
      if(!state.price) openPrice();
    }).catch(function(err){
      if(cb) cb(false, "Nie udało się wygenerować opisu: " + ((err && err.message) ? err.message : "sprawdź proxy / klucz / billing lub uściślij nazwę rośliny."));
    });
  }

  /* ---------- start ---------- */
  try { mount(); openName(); }
  catch(e){
    root.innerHTML = '<pre style="white-space:pre-wrap;color:#ffb4b4;font-family:monospace;max-width:680px;margin:40px auto;padding:20px;background:#15241A;border-radius:10px">Błąd: '+((e&&e.stack)||e)+'</pre>';
  }
})();
</script>
</body>
</html>
